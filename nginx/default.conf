upstream slide_converter {
    server slide-converter:3000;
}

upstream pptx_engine {
    server pptx-engine:8001;
}

upstream dashboard {
    server dashboard:3001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # 메인 — slide-converter (HTML→MD→PPTX)
    location / {
        proxy_pass http://slide_converter;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 대시보드
    location /dashboard/ {
        rewrite ^/dashboard(/.*)$ $1 break;
        proxy_pass http://dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # PPTX API 직접 접근
    location /pptx-api/ {
        rewrite ^/pptx-api(/.*)$ $1 break;
        proxy_pass http://pptx_engine;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
