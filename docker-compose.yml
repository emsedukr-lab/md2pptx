version: '3.9'

services:
  slide-converter:
    build: ./apps/app-3000
    ports:
      - "3000:3000"
    environment:
      - PPTX_HOST=pptx-engine
      - PPTX_PORT=8001
    depends_on:
      - pptx-engine
    restart: unless-stopped

  pptx-engine:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8001:8001"
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: apps/app-3001/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PPTX_HOST=pptx-engine
      - PPTX_PORT=8001
    depends_on:
      - pptx-engine
    restart: unless-stopped
